<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundry App Icon</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 185, 68, 0.18), transparent 32%),
        linear-gradient(180deg, #1d140e 0%, #120d09 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 12%;
    }

    .badge {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      border-radius: 26%;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 219, 142, 0.15), transparent 26%),
        linear-gradient(180deg, rgba(255, 166, 79, 0.08), rgba(255, 166, 79, 0) 38%),
        linear-gradient(180deg, #1a120d 0%, #120d09 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255, 197, 120, 0.14),
        0 18px 40px rgba(0, 0, 0, 0.45);
    }

    img {
      width: 72%;
      height: 72%;
      object-fit: contain;
      filter:
        drop-shadow(0 14px 22px rgba(0, 0, 0, 0.38))
        drop-shadow(0 0 18px rgba(255, 157, 43, 0.16));
    }
  </style>
</head>
<body>
  <div class="badge">
    <img src="./foundry-app-icon.svg" alt="Foundry" />
  </div>
</body>
</html>
