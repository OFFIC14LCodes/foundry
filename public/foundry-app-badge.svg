<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d140e" />
      <stop offset="100%" stop-color="#120d09" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="26%" r="36%">
      <stop offset="0%" stop-color="#ffb664" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#ffb664" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#bg)" />
  <rect width="512" height="512" rx="110" fill="url(#glow)" />

  <g filter="url(#shadow)">
    <rect x="62" y="62" width="388" height="388" rx="92" fill="#18110c" stroke="#3c2a1b" />
  </g>

  <image href="/foundry-app-icon.svg" x="120" y="88" width="272" height="272" preserveAspectRatio="xMidYMid meet" />
</svg>
